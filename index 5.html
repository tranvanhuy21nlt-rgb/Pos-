function catLabel(cat, lang) {
  const m = {
    vi: { "全部": "Tất cả", "麵類": "Mỳ", "水餃": "Sủi cảo", "湯類": "Canh", "飯類": "Cơm", "炒類": "Xào", "小菜": "Phụ" },
    zh: { "全部": "全部", "麵類": "麵類", "水餃": "水餃", "湯類": "湯類", "飯類": "飯類", "炒類": "炒類", "小菜": "小菜" },
  };
  return m[lang]?.[cat] || cat;
}

function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function hhmm(ts) { const d = new Date(ts); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }
function dn(item, lang) { return lang === "zh" ? item.name : (item.nameVi || item.name); }
function dsub(item, lang) { return lang === "zh" ? (item.nameVi || "") : item.name; }

/* Group items with size variants (大/小, 15顆/10顆) into single entries */
function groupMenu(items, lang) {
  const sizeRx = /[\(（](大|小|L|S|15顆|10顆)[\)）]/;
  const groups = [];
  const used = new Set();
  for (let i = 0; i < items.length; i++) {
    if (used.has(items[i].id)) continue;
    const m = items[i].name.match(sizeRx);
    if (m) {
      const base = items[i].name.replace(sizeRx, "").trim();
      const baseVi = (items[i].nameVi || "").replace(/\s*[\(（][LS][\)）]\s*/g, "").replace(/\s*\(\d+c\)\s*/g, "").trim();
      const variants = [];
      for (let j = i; j < items.length; j++) {
        if (used.has(items[j].id)) continue;
        const bj = items[j].name.replace(sizeRx, "").trim();
        if (bj === base) {
          const mj = items[j].name.match(sizeRx);
          const sizeLabel = mj ? mj[1] : "";
          let shortLabel = sizeLabel;
          if (sizeLabel === "大" || sizeLabel === "L") shortLabel = lang === "zh" ? "大" : "Lớn";
          else if (sizeLabel === "小" || sizeLabel === "S") shortLabel = lang === "zh" ? "小" : "Nhỏ";
          else if (sizeLabel === "15顆") shortLabel = "15";
          else if (sizeLabel === "10顆") shortLabel = "10";
          variants.push({ ...items[j], sizeLabel: shortLabel });
          used.add(items[j].id);
        }
      }
      const displayName = lang === "zh" ? base : (baseVi || base);
      const displaySub = lang === "zh" ? (baseVi || "") : base;
      groups.push({ key: `g-${items[i].id}`, baseName: displayName, baseSub: displaySub, variants, cat: items[i].cat });
    } else {
      used.add(items[i].id);
      groups.push({ key: `s-${items[i].id}`, baseName: dn(items[i], lang), baseSub: dsub(items[i], lang), variants: [{ ...items[i], sizeLabel: null }], cat: items[i].cat });
    }
  }
  return groups;
}

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Restore: upload JSON file to restore data
  const doRestore = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    input.onchange = async (e) => {
      try {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        const data = JSON.parse(text);
        if (data.menu && Array.isArray(data.menu)) {
          setMenu(data.menu);
          if (data.orders) setOrders(data.orders);
          if (data.customers) setCustomers(data.customers);
          flash(t.restoreOk);
        } else {
          flash(t.restoreFail);
        }
      } catch { flash(t.restoreFail); }
    };
    input.click();
  };

  const addToCart = (item) => {
    setCart(prev => {
      const i = prev.findIndex(c => c.id === item.id);
      if (i >= 0) { const n = [...prev]; n[i] = { ...n[i], qty: n[i].qty + 1 }; return n; }
      return [...prev, { ...item, qty: 1 }];
    });
  };
  const rmFromCart = (id) => setCart(p => p.filter(c => c.id !== id));
  const adjQty = (id, d) => setCart(p => p.map(c => c.id === id ? { ...c, qty: Math.max(0, c.qty + d) } : c).filter(c => c.qty > 0));
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const cartCount = cart.reduce((s, c) => s + c.qty, 0);

  const lookupCust = (phone) => {
    setCustPhone(phone);
    const f = customers.find(c => c.phone === phone);
    if (f) { setCustName(f.name); setCustAddr(f.address); } else { setCustName(""); setCustAddr(""); }
  };

  const placeOrder = () => {
    if (cart.length === 0) return flash(t.noItems);
    const order = { id: gid(), items: cart.map(c => ({ id: c.id, name: c.name, nameVi: c.nameVi, price: c.price, qty: c.qty })), total, type: orderType, tableNo, note: orderNote, custPhone, custName, custAddr, status: "pending", ts: Date.now(), date: today() };
    setOrders(prev => [order, ...prev]);
    if (custPhone && orderType === "delivery") {
      setCustomers(prev => { const i = prev.findIndex(c => c.phone === custPhone); const cu = { phone: custPhone, name: custName, address: custAddr, lastOrder: Date.now() }; if (i >= 0) { const n = [...prev]; n[i] = cu; return n; } return [cu, ...prev]; });
    }
    setCart([]); setCustPhone(""); setCustName(""); setCustAddr(""); setTableNo(""); setOrderNote(""); setShowCart(false);
    flash(t.orderCreated); setTab("orders");
  };

  const setStatus = (id, s) => setOrders(p => p.map(o => o.id === id ? { ...o, status: s } : o));

  const todayOrders = orders.filter(o => o.date === today());
  const dayOrders = orders.filter(o => o.date === revenueDate);
  const completedDay = dayOrders.filter(o => o.status === "done");
  const dayRev = completedDay.reduce((s, o) => s + o.total, 0);
  const pendingCount = todayOrders.filter(o => o.status === "pending").length;

  const filteredMenu = menu.filter(m => selectedCat === "全部" || m.cat === selectedCat);
  const groupedMenu = groupMenu(filteredMenu, lang);
  const filteredCust = customers.filter(c => !custSearch || c.phone.includes(custSearch) || (c.name || "").toLowerCase().includes(custSearch.toLowerCase()));

  const TABS = [
    { id: "order", icon: "🍜", label: t.orderTab },
    { id: "orders", icon: "📋", label: t.ordersTab, badge: pendingCount },
    { id: "customers", icon: "👥", label: t.custTab },
    { id: "revenue", icon: "💰", label: t.revTab },
    { id: "menu", icon: "⚙️", label: t.menuTab },
  ];

  // Data loads instantly, no loading screen needed

  return (
    <div style={s.shell}>
      {toast && <div style={s.toast}>{toast}</div>}

      {/* ── HEADER ── */}
      <header style={s.header}>
        <span style={s.headerTitle}>阿蛾牛肉麵</span>
        <button style={s.langToggle} onClick={toggleLang}>
          {lang === "vi" ? "🇹🇼" : "🇻🇳"} {t.langSwitch}
        </button>
      </header>

      {/* ── CONTENT ── */}
      <main style={s.main}>

        {/* ════ ORDER ════ */}
        {tab === "order" && <>
          {/* Order type selector */}
          <div style={s.typeStrip}>
            {["dinein","takeout","delivery"].map(k => (
              <button key={k} onClick={() => setOrderType(k)} style={{...s.typeChip, ...(orderType===k ? s.typeChipOn : {})}}>
                <span style={s.typeIcon}>{k==="dinein"?"🪑":k==="takeout"?"🥡":"🛵"}</span>
                <span>{t[k]}</span>
              </button>
            ))}
          </div>

          {orderType === "dinein" && (
            <div style={s.tableSection}>
              <div style={s.tableLbl}>{t.selectTable}</div>
              <div style={s.tableGrid}>
                {[1,2,3,5,6,8].map(n=>(
                  <button key={n} onClick={()=>setTableNo(String(n))} style={{...s.tableBtn, ...(tableNo===String(n)?s.tableBtnOn:{})}}>
                    <span style={s.tableBtnIcon}>🪑</span>
                    <span style={s.tableBtnNum}>{n}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
          {orderType === "delivery" && (
            <div style={s.delivBox}>
              <input style={s.field} placeholder={t.phone} value={custPhone} onChange={e=>lookupCust(e.target.value)} />
              {custPhone && <>
                <input style={s.field} placeholder={t.custNamePh} value={custName} onChange={e=>setCustName(e.target.value)} />
                <input style={s.field} placeholder={t.addressPh} value={custAddr} onChange={e=>setCustAddr(e.target.value)} />
                {customers.find(c=>c.phone===custPhone) && <div style={s.foundPill}>✅ {t.foundCust}</div>}
              </>}
            </div>
          )}

          {/* Category sidebar + Menu items */}
          <div style={s.menuLayout}>
            {/* Left: vertical category tabs */}
            <div style={s.catSidebar}>
              {CAT_KEYS.map(c => (
                <button key={c} onClick={()=>setSelectedCat(c)} style={{...s.catTab, ...(selectedCat===c ? s.catTabOn : {})}}>
                  {catLabel(c, lang)}
                </button>
              ))}
            </div>

            {/* Right: menu items list — grouped by size */}
            <div style={s.menuList}>
              {groupedMenu.map(group => {
                const hasMulti = group.variants.length > 1;
                const anyInCart = group.variants.some(v => cart.find(c => c.id === v.id));
                return (
                  <div key={group.key} style={{...s.menuCard, ...(anyInCart ? s.menuCardOn : {})}}>
                    <div style={s.menuCardTop}>
                      <div style={s.menuMainName}>{group.baseName}</div>
                      <div style={s.menuSubName}>{group.baseSub}</div>
                    </div>
                    <div style={s.sizeRow}>
                      {group.variants.map(v => {
                        const inCart = cart.find(c => c.id === v.id);
                        return (
                          <button key={v.id} onClick={(e)=>{e.stopPropagation();addToCart(v);}} style={{...s.sizeBtn, ...(inCart ? s.sizeBtnOn : {})}}>
                            {v.sizeLabel && <span style={s.sizeLbl}>{v.sizeLabel}</span>}
                            <span style={s.sizePrice}>${v.price}</span>
                            {inCart && <span style={s.sizeBadge}>{inCart.qty}</span>}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
              <div style={{height:80}}/>
            </div>
          </div>

          {/* Floating cart bar */}
          {cartCount > 0 && !showCart && (
            <button style={s.cartBar} onClick={()=>setShowCart(true)}>
              <span style={s.cartBarLeft}>🛒 {cartCount} {t.itemCount}</span>
              <span style={s.cartBarRight}>${total}</span>
            </button>
          )}

          {/* Cart bottom sheet */}
          {showCart && (
            <div style={s.sheetOverlay} onClick={()=>setShowCart(false)}>
              <div style={s.sheet} onClick={e=>e.stopPropagation()}>
                <div style={s.sheetHandle}><div style={s.handleBar}/></div>
                <div style={s.sheetTitle}>{t.currentOrder}</div>
                <div style={s.sheetScroll}>
                  {cart.map(c => (
                    <div key={c.id} style={s.cartRow}>
                      <div style={s.cartInfo}>
                        <div style={s.cartName}>{dn(c,lang)}</div>
                        <div style={s.cartSub}>${c.price}</div>
                      </div>
                      <div style={s.cartControls}>
                        <button style={s.qBtn} onClick={()=>adjQty(c.id,-1)}>−</button>
                        <span style={s.qNum}>{c.qty}</span>
                        <button style={s.qBtn} onClick={()=>adjQty(c.id,1)}>+</button>
                        <button style={s.qDel} onClick={()=>rmFromCart(c.id)}>✕</button>
                      </div>
                    </div>
                  ))}
                  <textarea style={s.noteArea} placeholder={t.notePlaceholder} value={orderNote} onChange={e=>setOrderNote(e.target.value)} rows={2}/>
                </div>
                <div style={s.sheetFooter}>
                  <div style={s.sheetTotal}><span>{t.total}</span><span style={s.sheetTotalAmt}>${total}</span></div>
                  <button style={s.confirmBtn} onClick={placeOrder}>{t.confirmOrder}</button>
                </div>
              </div>
            </div>
          )}
        </>}

        {/* ════ ORDERS ════ */}
        {tab === "orders" && <>
          <div style={s.statRow}>
            {[["pending",t.pending,"#F9A825"],["cooking",t.cooking,"#C62828"],["done",t.completed,"#2E7D32"]].map(([st,lb,cl])=>(
              <div key={st} style={s.statCard}>
                <div style={{...s.statNum, color: cl}}>{todayOrders.filter(o=>o.status===st).length}</div>
                <div style={s.statLbl}>{lb}</div>
              </div>
            ))}
          </div>
          {todayOrders.length===0 && <div style={s.emptyMsg}>{t.noOrders}</div>}
          {todayOrders.map(o => (
            <div key={o.id} style={{...s.oCard, borderLeftColor: o.status==="pending"?"#F9A825":o.status==="cooking"?"#C62828":o.status==="done"?"#2E7D32":"#aaa"}}>
              <div style={s.oTop}>
                <div>
                  <span style={s.oTime}>{hhmm(o.ts)}</span>
                  <span style={s.oType}>{o.type==="dinein"?`🪑 ${t.table} ${o.tableNo||"?"}`:o.type==="takeout"?`🥡 ${t.takeoutLabel}`:`🛵 ${o.custName||o.custPhone}`}</span>
                </div>
                <span style={s.oTotal}>${o.total}</span>
              </div>
              <div style={s.oItems}>{o.items.map((it,i)=><span key={i} style={s.oTag}>{dn(it,lang)} ×{it.qty}</span>)}</div>
              {o.note && <div style={s.oNote}>📝 {o.note}</div>}
              {o.type==="delivery"&&o.custAddr && <div style={s.oAddr}>📍 {o.custAddr}</div>}
              <div style={s.oActions}>
                {o.status==="pending" && <>
                  <button style={s.oBtnCook} onClick={()=>setStatus(o.id,"cooking")}>{t.startCook}</button>
                  <button style={s.oBtnCancel} onClick={()=>setStatus(o.id,"cancelled")}>{t.cancel}</button>
                </>}
                {o.status==="cooking" && <button style={s.oBtnDone} onClick={()=>setStatus(o.id,"done")}>{t.doneAction}</button>}
                {o.status==="done" && <div style={s.oBadgeDone}>{t.doneBadge}</div>}
                {o.status==="cancelled" && <div style={s.oBadgeCancel}>{t.cancelledBadge}</div>}
              </div>
            </div>
          ))}
        </>}

        {/* ════ CUSTOMERS ════ */}
        {tab === "customers" && <>
          <input style={s.field} placeholder={t.searchCust} value={custSearch} onChange={e=>setCustSearch(e.target.value)}/>
          {filteredCust.length===0 && <div style={s.emptyMsg}>{t.noCust}</div>}
          {filteredCust.map(c=>(
            <div key={c.phone} style={s.cCard}>
              <div style={s.cAvatar}>{(c.name||"?")[0]}</div>
              <div style={s.cInfo}>
                <div style={s.cName}>{c.name||"—"}</div>
                <div style={s.cPhone}>📱 {c.phone}</div>
                <div style={s.cAddr}>📍 {c.address||t.noAddr}</div>
                <div style={s.cLast}>{t.lastOrder}: {c.lastOrder?new Date(c.lastOrder).toLocaleDateString(lang==="vi"?"vi":"zh-TW"):"—"}</div>
              </div>
            </div>
          ))}
        </>}

        {/* ════ REVENUE ════ */}
        {tab === "revenue" && <>
          <input type="date" style={s.field} value={revenueDate} onChange={e=>setRevenueDate(e.target.value)}/>
          <div style={s.revHero}>
            <div style={s.revAmt}>${dayRev.toLocaleString()}</div>
            <div style={s.revSub}>{t.revLabel} {revenueDate}</div>
          </div>
          <div style={s.statRow}>
            <div style={s.statCard}><div style={s.statNum}>{completedDay.length}</div><div style={s.statLbl}>{t.completedOrders}</div></div>
            <div style={s.statCard}><div style={s.statNum}>${completedDay.length>0?Math.round(dayRev/completedDay.length):0}</div><div style={s.statLbl}>{t.avgOrder}</div></div>
            <div style={s.statCard}><div style={s.statNum}>{dayOrders.filter(o=>o.status==="cancelled").length}</div><div style={s.statLbl}>{t.cancelledOrders}</div></div>
          </div>
          {completedDay.length>0 && (
            <div style={s.topBox}>
              <div style={s.topHead}>{t.topItems}</div>
              {(()=>{const ct={};completedDay.forEach(o=>o.items.forEach(it=>{const k=dn(it,lang);ct[k]=(ct[k]||0)+it.qty;}));return Object.entries(ct).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n,q],i)=>(
                <div key={n} style={s.topRow}><span style={s.topIdx}>{i+1}</span><span style={s.topN}>{n}</span><span style={s.topQ}>×{q}</span></div>
              ));})()}
            </div>
          )}
        </>}

        {/* ════ MENU MANAGEMENT ════ */}
        {tab === "menu" && <>
          <div style={s.addBox}>
            <div style={s.addHead}>{t.addNew}</div>
            <input style={s.field} placeholder={t.nameCn} value={newItem.name} onChange={e=>setNewItem({...newItem,name:e.target.value})}/>
            <input style={s.field} placeholder={t.nameVi} value={newItem.nameVi} onChange={e=>setNewItem({...newItem,nameVi:e.target.value})}/>
            <div style={{display:"flex",gap:10}}>
              <input style={{...s.field,flex:1}} placeholder={t.pricePh} type="number" value={newItem.price} onChange={e=>setNewItem({...newItem,price:e.target.value})}/>
              <select style={{...s.field,flex:1}} value={newItem.cat} onChange={e=>setNewItem({...newItem,cat:e.target.value})}>
                {CAT_KEYS.filter(c=>c!=="全部").map(c=><option key={c} value={c}>{catLabel(c,lang)}</option>)}
              </select>
            </div>
            <button style={s.addSubmit} onClick={()=>{
              if(!newItem.name||!newItem.price) return flash(t.needNamePrice);
              setMenu(p=>[...p,{...newItem,id:Date.now(),price:Number(newItem.price)}]);
              setNewItem({name:"",nameVi:"",price:"",cat:"麵類"});
              flash(t.added);
            }}>{t.addBtn}</button>
          </div>
          {menu.map(item=>(
            <div key={item.id} style={s.mCard}>
              {editingMenu===item.id ? (
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <input style={s.field} value={item.name} onChange={e=>setMenu(p=>p.map(m=>m.id===item.id?{...m,name:e.target.value}:m))}/>
                  <input style={s.field} value={item.nameVi||""} onChange={e=>setMenu(p=>p.map(m=>m.id===item.id?{...m,nameVi:e.target.value}:m))}/>
                  <input style={s.field} type="number" value={item.price} onChange={e=>setMenu(p=>p.map(m=>m.id===item.id?{...m,price:Number(e.target.value)}:m))}/>
                  <button style={s.mSave} onClick={()=>{setEditingMenu(null);flash(t.saved);}}>{t.saveBtnLabel}</button>
                </div>
              ) : (
                <div style={s.mRow}>
                  <div style={{flex:1}}>
                    <div style={s.mName}>{dn(item,lang)}</div>
                    <div style={s.mSub}>{dsub(item,lang)}</div>
                  </div>
                  <span style={s.mPrice}>${item.price}</span>
                  <button style={s.mEdit} onClick={()=>setEditingMenu(item.id)}>✏️</button>
                  <button style={s.mDel} onClick={()=>{if(confirm(t.deleteConfirm)&&confirm(t.deleteConfirm2))setMenu(p=>p.filter(m=>m.id!==item.id));}}>🗑</button>
                </div>
              )}
            </div>
          ))}

          {/* ── Backup & Restore ── */}
          <div style={s.backupBox}>
            <div style={s.backupHead}>{t.backupTitle}</div>
            <p style={s.backupDesc}>{t.backupDesc}</p>
            <button style={s.bkBtn} onClick={doBackup}>{t.backupBtn}</button>
            <p style={{...s.backupDesc, marginTop: 16}}>{t.restoreDesc}</p>
            <button style={s.rsBtn} onClick={doRestore}>{t.restoreBtn}</button>
            <div style={s.bkDivider}/>
            <button style={s.delAllBtn} onClick={()=>{
              if(confirm(t.resetConfirm)){setOrders([]);flash(t.resetDone);}
            }}>{t.resetBtn}</button>
          </div>
        </>}
      </main>

      {/* ── BOTTOM NAV ── */}
      <nav style={s.nav}>
        {TABS.map(tb=>(
          <button key={tb.id} onClick={()=>setTab(tb.id)} style={{...s.navItem, ...(tab===tb.id?s.navItemOn:{})}}>
            <span style={s.navIcon}>{tb.icon}{tb.badge>0&&<span style={s.navBadge}>{tb.badge}</span>}</span>
            <span style={s.navLbl}>{tb.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

  brown: "#4E342E",

const s = {

  loadWrap: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: `linear-gradient(135deg, ${V.red}, ${V.redDark})` },

  toast: { position: "fixed", top: 24, left: "50%", transform: "translateX(-50%)", background: V.dark, color: V.gold, padding: "14px 28px", borderRadius: 50, fontSize: 16, fontWeight: 700, zIndex: 9999, boxShadow: "0 8px 30px rgba(0,0,0,0.3)" },

  // Header — red gradient
  header: { background: `linear-gradient(135deg, ${V.red}, ${V.redDark})`, color: V.white, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 20px", position: "sticky", top: 0, zIndex: 100 },

  // Main
  main: { flex: 1, padding: "16px 16px 100px", overflowY: "auto" },

  // Order type strip
  typeStrip: { display: "flex", gap: 10, marginBottom: 16 },

  typeChipOn: { borderColor: V.red, background: V.red, color: V.white },
  typeIcon: { fontSize: 26 },

  // Fields
  field: { width: "100%", padding: "16px 18px", border: `2px solid ${V.warm5}`, borderRadius: V.radius, fontSize: 17, marginBottom: 12, outline: "none", background: V.white, color: V.dark, boxSizing: "border-box", fontFamily: V.font },
  delivBox: { background: V.white, borderRadius: V.radius, padding: 16, marginBottom: 16, border: `2px solid ${V.warm5}` },

  // Table selector
  tableSection: { marginBottom: 16 },
  tableLbl: { fontSize: 17, fontWeight: 700, marginBottom: 10, color: V.brown },
  tableGrid: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 },
  tableBtn: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4, padding: "18px 10px", borderRadius: V.radius, border: `2px solid ${V.warm5}`, background: V.white, cursor: "pointer", transition: "all .15s", color: V.brown },
  tableBtnOn: { borderColor: V.red, background: V.red, color: V.white },
  tableBtnIcon: { fontSize: 28 },
  tableBtnNum: { fontSize: 24, fontWeight: 900 },
  foundPill: { fontSize: 15, color: V.green, fontWeight: 700, marginTop: 4 },

  // Category sidebar + menu layout

  catTab: { padding: "16px 6px", border: "none", borderRight: "3px solid transparent", background: V.cream, fontSize: 15, fontWeight: 700, cursor: "pointer", color: V.warm3, textAlign: "center", transition: "all .15s", borderBottom: `1px solid ${V.warm5}` },
  catTabOn: { background: V.white, color: V.red, borderRightColor: V.red, fontWeight: 900 },

  menuList: { flex: 1, display: "flex", flexDirection: "column", gap: 10, padding: "0 0 0 10px" },
  menuCard: { padding: "14px 16px", border: `2px solid ${V.warm5}`, borderRadius: V.radius, background: V.white, textAlign: "left", transition: "all .15s", width: "100%", boxSizing: "border-box" },
  menuCardOn: { borderColor: V.gold, background: V.goldPale },
